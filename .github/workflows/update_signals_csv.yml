name: Update Exosome Market Signals

on:
  schedule:
    - cron: '0 7 * * 1'   # every Monday at 7am UTC
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser groq

      - name: Run signal fetcher
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/fetch_signals_csv.py

      - name: Commit updated CSVs back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals.csv data/meta.csv
          git diff --staged --quiet || git commit -m "auto: update market signals $(date +'%Y-%m-%d')"
          git push
